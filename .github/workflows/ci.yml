name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Build + test (Rust workspace)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format check
        run: cargo fmt --check

      - name: Build (release)
        run: cargo build --release --all-targets

      - name: Unit tests
        run: cargo test --release --lib

      - name: CLI unit tests
        run: cargo test --release -p tai-cli

      # Clippy is informational for now — too many existing warnings to gate
      # on. Run with --no-deps to skip third-party crate lints.
      - name: Clippy (informational)
        run: cargo clippy --release --no-deps -- -A clippy::too_many_arguments -A clippy::result_large_err
        continue-on-error: true

  move:
    name: Move package build + test
    runs-on: ubuntu-latest
    # Pin to the same Sui release the v1.1.0 publish used. Updating
    # this version requires reviewing Move source compatibility.
    env:
      SUI_VERSION: testnet-v1.72.2
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          set -euo pipefail
          curl -L -o /tmp/sui.tgz \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          mkdir -p /tmp/sui-bin
          tar -xzf /tmp/sui.tgz -C /tmp/sui-bin
          echo "/tmp/sui-bin" >> "$GITHUB_PATH"
          /tmp/sui-bin/sui --version

      - name: Move build
        working-directory: move
        run: sui move build

      - name: Move test
        working-directory: move
        run: sui move test
